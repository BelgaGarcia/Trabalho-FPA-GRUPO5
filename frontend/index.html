<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sincronizador de Padroes</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">FPAA</p>
        <h1>Sincronizador de Padroes</h1>
        <p class="intro">
          Etapa inicial para comparar as sequencias de Helena e Marcus usando programacao dinamica.
        </p>
      </section>

      <section class="panel">
        <form class="form">
          <label>
            <span>Helena</span>
            <input id="input-helena" type="text" maxlength="80" placeholder="sequencia de eventos" />
          </label>

          <label>
            <span>Marcus</span>
            <input id="input-marcus" type="text" maxlength="80" placeholder="sequencia de eventos" />
          </label>

          <button type="button" id="btn-sync">Calcular LCS</button>
        </form>

        <div class="status">
          <p id="server-status">Verificando servidor...</p>
          <pre id="preview-output">O comprimento da LCS e a tabela DP aparecerao aqui.</pre>
        </div>
      </section>
    </main>

    <script src="/js/app.js"></script>
  </body>
</html>
